<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Selloraa</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50/50 min-h-screen flex items-center justify-center p-6 selection:bg-black selection:text-white">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-lg shadow-black/10">
                    <i data-lucide="shopping-bag" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tighter font-display">SELLORAA</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight font-display">Create your store</h1>
            <p class="text-gray-500 mt-2 font-medium">Join thousands of vendors selling on Selloraa</p>
        </div>

        <div class="bg-white p-10 rounded-[48px] shadow-2xl shadow-gray-200/50 border border-gray-100">
            <form id="register-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Store Name</label>
                        <input type="text" id="store_name" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all font-medium" placeholder="My Store">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Location</label>
                        <input type="text" id="location" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all font-medium" placeholder="London, UK">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all font-medium" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" id="password" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all font-medium" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-black text-white py-5 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-xl shadow-black/10">
                    Create Store
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-50 text-center">
                <p class="text-gray-500 text-sm font-medium">Already have a store? <a href="login.html" class="text-black font-bold hover:underline">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const store_name = document.getElementById('store_name').value;
            const location = document.getElementById('location').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/php/api/auth_api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'register', store_name, location, email, password })
            });

            const result = await response.json();
            if (response.ok) {
                localStorage.setItem('vendor_uid', result.uid);
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
