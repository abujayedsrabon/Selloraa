<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Selloraa</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center">
                    <i data-lucide="shopping-bag" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tighter">SELLORAA</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Welcome back</h1>
            <p class="text-gray-500 mt-2">Enter your credentials to access your dashboard</p>
        </div>

        <div class="bg-white p-10 rounded-[40px] shadow-2xl shadow-gray-200/50 border border-gray-100">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
                    <input type="password" id="password" required class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-black text-white py-5 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-xl shadow-gray-200">
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-50 text-center">
                <p class="text-gray-500 text-sm">Don't have a store yet? <a href="register.html" class="text-black font-bold hover:underline">Start selling</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/php/api/auth_api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', email, password })
            });

            const result = await response.json();
            if (response.ok) {
                localStorage.setItem('vendor_uid', result.uid);
                localStorage.setItem('user_role', result.role);
                if (result.role === 'admin') {
                    window.location.href = 'admin/index.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
